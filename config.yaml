# ─────────────── 端口与基础配置 ───────────────

# HTTP 代理端口
port: 7890
# SOCKS5 代理端口
socks-port: 7891
# Linux 和 macOS 的 redir 代理端口
redir-port: 7892
# 允许局域网的连接
allow-lan: true

# IPv6 总开关（绝大多数场景关闭性能更好，避免 IPv6 解析延迟）
ipv6: false

# 规则模式：Rule（规则）/ Global（全局代理）/ Direct（全局直连）
mode: rule

# 日志级别：silent / info / warning / error / debug
log-level: silent
# Clash 的 RESTful API
external-controller: '0.0.0.0:9090'
external-ui: ui
# RESTful API 的口令
secret: ''

# ─────────────── 性能优化（Clash Meta / Mihomo 专属，老内核会忽略） ───────────────

# 并发 TCP 连接（更快的握手与连接复用）
tcp-concurrent: true

# 统一延迟测试（去除 TCP 握手时间，反映真实延迟，对比测速更公平）
unified-delay: true

# 全局 TLS 指纹（默认伪装成 Chrome，提升通用兼容性）
global-client-fingerprint: chrome

# GeoIP 数据加载模式（true = 使用更高效的 mmdb 二进制格式）
geodata-mode: true

# GeoData 数据库下载源（默认 GitHub 在国内访问不稳，改用 jsDelivr CDN 提升成功率）
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"


tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  mtu: 1500
  dns-hijack:
    - any:53
    - tcp://any:53
# ─────────────── DNS 配置（始终启用，使用 fake-ip + DoH） ───────────────
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053

  # fake-ip 模式：性能最佳，避免真实 DNS 解析延迟
  # （客户端获得伪 IP 后由 Clash 代为解析，配合 sniffer 实现精准分流）
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # 这些域名不走 fake-ip（局域网/系统检测/NTP/QQ 登录等需要真实解析）
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'localhost.ptlogin2.qq.com'
    - 'localhost.work.weixin.qq.com'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'time.*.apple.com'
    - 'pool.ntp.org'
    - '+.ntp.org'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - '+.ubuntu.com'
    - '+.debian.org'

  # 用于解析 nameserver/fallback 列表中的域名（自举 DNS）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114

  # 主 DNS（DoH 加密，用于解析国内域名）
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - 223.5.5.5

  # 备用 DNS（用于解析国外域名，防污染）
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - tls://8.8.8.8:853

  # 智能分流：解析结果若为 CN IP 走 nameserver，非 CN 走 fallback
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

  # 代理服务器域名专用 DNS（避免代理服务器自己的域名被污染导致连不上）
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - 223.5.5.5

# ─────────────── 嗅探器配置（让 fake-ip 模式下规则匹配精准到域名） ───────────────
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # 强制嗅探（即使在 skip-domain 列表也嗅探，用于解锁敏感服务）
  force-domain:
    - '+.netflix.com'
    - '+.nflxvideo.net'
  # 跳过嗅探（避免自家服务被错误识别）
  skip-domain:
    - 'Mijia Cloud'
    - 'dlg.io.mi.com'
    - '+.push.apple.com'
    - '+.apple.com'

# ─────────────── TUN 模式（高级用户可选，开启后系统所有流量自动接管） ───────────────
# 注意：开启 TUN 需要客户端拥有管理员/Root 权限
# tun:
#   enable: true
#   stack: gvisor              # 推荐 gvisor（兼容性好），可选 system / mixed
#   dns-hijack:
#     - any:53
#     - tcp://any:53
#   auto-route: true
#   auto-redirect: true
#   auto-detect-interface: true

